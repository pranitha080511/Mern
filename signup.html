<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Hikari's Luxe</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-pink-50">

    <section class="flex justify-center items-center min-h-screen">

        <div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-lg">

            <h2 class="text-3xl font-bold text-center text-pink-600 mb-8">
                Create Account
            </h2>

            <form>

                <label class="font-semibold">Full Name</label><br>
                <input
                    type="text"
                    placeholder="Enter your full name"
                    class="w-full mt-2 p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-pink-500">

                <br><br>

                <label class="font-semibold">Email</label><br>
                <input
                    type="email"
                    placeholder="Enter your email"
                    class="w-full mt-2 p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-pink-500">

                <br><br>

                <label class="font-semibold">Phone Number</label><br>
                <input
                    type="tel"
                    placeholder="Enter your phone number"
                    class="w-full mt-2 p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-pink-500">

                <br><br>

                <label class="font-semibold">Date of Birth</label><br>
                <input
                    type="date"
                    class="w-full mt-2 p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-pink-500">

                <br><br>

                <label class="font-semibold">Gender</label><br>

                <div class="mt-2 space-x-4">
                    <label>
                        <input type="radio" name="gender" class="accent-pink-600">
                        Male
                    </label>

                    <label>
                        <input type="radio" name="gender" class="accent-pink-600">
                        Female
                    </label>

                    <label>
                        <input type="radio" name="gender" class="accent-pink-600">
                        Other
                    </label>
                </div>

                <br>

                <label class="font-semibold">Password</label><br>
                <input
                    type="password"
                    placeholder="Enter password"
                    class="w-full mt-2 p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-pink-500">

                <br><br>

                <label class="font-semibold">Confirm Password</label><br>
                <input
                    type="password"
                    placeholder="Confirm password"
                    class="w-full mt-2 p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-pink-500">

                <br><br>

                <label class="font-semibold">Select Skin Type</label><br>

                <select
                    class="w-full mt-2 p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-pink-500">

                    <option>Dry</option>
                    <option>Oily</option>
                    <option>Combination</option>
                    <option>Normal</option>

                </select>

                <br><br>

                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-pink-600">
                    I agree to the Terms & Conditions
                </label>

                <br>

                <div class="flex justify-center gap-4">

                    <button
                        class="bg-pink-600 hover:bg-pink-700 text-white px-6 py-3 rounded-lg transition">
                        Create Account
                    </button>

                    <button
                        type="reset"
                        class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-lg transition">
                        Reset
                    </button>

                </div>

            </form>

        </div>

    </section>

</body>

</html>
